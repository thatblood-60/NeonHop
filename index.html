<!DOCTYPE html>  
<html lang="tr">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">  
<title>NeonHop</title>  
<style>  
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;700;900&display=swap');  
  
:root {  
  --bg:#07071a;--bg2:#0d0d28;--accent:#00d4ff;--accent2:#ff2d78;  
  --gold:#ffd700;--green:#00ff88;--purple:#aa44ff;--text:#e0e8ff;  
  --muted:#445577;--card:rgba(255,255,255,0.04);--border:rgba(0,212,255,0.18);  
}  
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}  
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}  
body{font-family:'Rajdhani',sans-serif;color:var(--text);touch-action:none;}  
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;overflow-x:hidden;}  
.screen.active{display:flex;}  
::-webkit-scrollbar{width:4px;}  
::-webkit-scrollbar-track{background:transparent;}  
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}  
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}  
.z1{position:relative;z-index:1;}  
.btn{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;padding:14px 32px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;letter-spacing:1px;text-transform:uppercase;}  
.btn:active{transform:scale(.96);}  
.btn-primary{background:linear-gradient(135deg,var(--accent),#0077aa);color:#fff;box-shadow:0 0 20px rgba(0,212,255,.35);}  
.btn-primary:hover{box-shadow:0 0 35px rgba(0,212,255,.6);}  
.btn-danger{background:linear-gradient(135deg,var(--accent2),#880022);color:#fff;}  
.btn-gold{background:linear-gradient(135deg,var(--gold),#cc8800);color:#000;}  
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}  
.btn-sm{padding:9px 20px;font-size:10px;}  
.btn-iap{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border:1px solid rgba(255,215,0,.4);box-shadow:0 0 15px rgba(255,215,0,.2);}  
.btn-iap:hover{box-shadow:0 0 25px rgba(255,215,0,.4);}  
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;backdrop-filter:blur(10px);}  
.glow-text{text-shadow:0 0 20px var(--accent);}  
  
/* LOGIN */  
#loginScreen{justify-content:center;padding:20px;}  
.login-box{width:100%;max-width:380px;padding:40px 32px;background:rgba(13,13,40,0.92);border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(20px);text-align:center;}  
.login-logo{font-family:'Exo 2',sans-serif;font-size:38px;font-weight:900;background:linear-gradient(135deg,#00d4ff,#aa44ff,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;margin-bottom:4px;text-shadow:none;filter:drop-shadow(0 0 20px #00d4ff88);}  
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:2px;}  
.login-tabs{display:flex;gap:8px;margin-bottom:24px;}  
.tab-btn{flex:1;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Orbitron',sans-serif;font-size:10px;cursor:pointer;transition:.2s;}  
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}  
.inp{width:100%;padding:13px 16px;margin-bottom:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;transition:.2s;}  
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1);}  
.inp::placeholder{color:var(--muted);}  
.err-msg{color:var(--accent2);font-size:12px;margin-bottom:10px;min-height:16px;}  
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px;}  
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}  
  
/* MAIN MENU */  
#menuScreen{padding:0;}  
.menu-header{width:100%;padding:24px 20px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}  
.menu-logo{font-family:'Exo 2',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,#00d4ff,#aa44ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;filter:drop-shadow(0 0 10px #00d4ff66);}  
.user-info{display:flex;align-items:center;gap:10px;}  
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--accent);background:rgba(0,212,255,.1);}  
.user-name{font-size:13px;font-weight:700;}  
.user-coins{font-size:11px;color:var(--gold);display:flex;align-items:center;gap:4px;}  
.menu-body{width:100%;max-width:480px;padding:20px;display:flex;flex-direction:column;gap:16px;}  
.hero-card{padding:28px 24px;text-align:center;background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(255,45,120,.08));border:1px solid var(--border);border-radius:18px;position:relative;overflow:hidden;}  
.hero-card::before{content:'';position:absolute;inset:-40%;background:radial-gradient(ellipse at 50% 50%,rgba(0,212,255,.06),transparent 60%);animation:rotate 8s linear infinite;}  
@keyframes rotate{to{transform:rotate(360deg);}}  
.hero-title{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:8px;}  
.hero-score{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:var(--gold);line-height:1;}  
.hero-best{font-size:13px;color:var(--muted);margin-top:4px;}  
.level-section{padding:18px 20px;}  
.level-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}  
.level-badge{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;background:linear-gradient(135deg,var(--purple),#6600aa);color:#fff;}  
.level-xp{font-size:12px;color:var(--muted);}  
.xp-bar{height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}  
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width .6s ease;}  
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}  
.menu-tile{padding:20px 16px;border-radius:14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;border:1px solid var(--border);background:var(--card);transition:.2s;text-align:center;}  
.menu-tile:active{transform:scale(.97);}  
.menu-tile .icon{font-size:28px;}  
.menu-tile .label{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;}  
.menu-tile.highlight{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.06);}  
.menu-tile.vip-tile{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06);}  
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}  
.stat-box{padding:14px 10px;text-align:center;border-radius:12px;background:var(--card);border:1px solid var(--border);}  
.stat-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--accent);}  
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;}  
  
/* SHOP */  
#shopScreen{padding:0;}  
.screen-header{width:100%;padding:18px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);}  
.back-btn{width:36px;height:36px;border-radius:8px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:.2s;flex-shrink:0;}  
.back-btn:active{transform:scale(.92);}  
.screen-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;}  
.coin-display{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);}  
.shop-body{width:100%;max-width:480px;padding:16px;}  
.shop-section{margin-bottom:28px;}  
.shop-section-title{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:12px;}  
  
/* IAP Section */  
.iap-banner{padding:20px;border-radius:16px;background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,100,0,.08));border:1px solid rgba(255,215,0,.35);margin-bottom:28px;text-align:center;position:relative;overflow:hidden;}  
.iap-banner::before{content:'👑';position:absolute;font-size:80px;right:-10px;top:-10px;opacity:0.08;}  
.iap-banner-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--gold);margin-bottom:6px;}  
.iap-banner-sub{font-size:11px;color:var(--muted);margin-bottom:16px;}  
.iap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}  
.iap-pack{padding:16px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,215,0,.25);text-align:center;cursor:pointer;transition:.2s;position:relative;}  
.iap-pack:active{transform:scale(.97);}  
.iap-pack.popular::before{content:'🔥 POPÜLER';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;font-family:'Orbitron',sans-serif;font-size:8px;padding:3px 10px;border-radius:10px;white-space:nowrap;}  
.iap-pack.best::before{content:'💎 EN İYİ DEĞER';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;font-family:'Orbitron',sans-serif;font-size:8px;padding:3px 10px;border-radius:10px;white-space:nowrap;}  
.iap-icon{font-size:28px;margin-bottom:6px;display:block;}  
.iap-coins{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--gold);}  
.iap-price{font-size:11px;color:var(--muted);margin-top:2px;}  
.iap-real-price{font-family:'Orbitron',sans-serif;font-size:13px;color:#fff;margin-top:6px;font-weight:700;}  
  
.platform-btns{display:flex;gap:10px;}  
.platform-btn{flex:1;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;}  
.platform-btn:active{transform:scale(.97);}  
.btn-gplay{background:linear-gradient(135deg,#01875f,#00a676);color:#fff;}  
.btn-apple{background:linear-gradient(135deg,#1c1c1e,#3a3a3c);color:#fff;border:1px solid rgba(255,255,255,.15);}  
  
/* VIP Characters shop */  
.shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}  
.shop-item{padding:18px 14px;border-radius:14px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden;}  
.shop-item:active{transform:scale(.97);}  
.shop-item.owned{border-color:var(--green);background:rgba(0,255,136,.04);}  
.shop-item.equipped{border-color:var(--gold);background:rgba(255,215,0,.06);}  
.shop-item.vip-item{border-color:rgba(255,215,0,.4);background:linear-gradient(135deg,rgba(255,215,0,.05),rgba(255,100,0,.05));}  
.shop-item .item-preview{font-size:36px;margin-bottom:8px;display:block;}  
.shop-item .item-name{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;margin-bottom:4px;}  
.shop-item .item-desc{font-size:11px;color:var(--muted);margin-bottom:10px;}  
.shop-item .item-price{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:4px;}  
.shop-item .item-price.free{color:var(--green);}  
.shop-item .item-price.real-money{color:#ff9500;}  
.owned-badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 7px;border-radius:10px;background:var(--green);color:#000;font-weight:700;}  
.equipped-badge{background:var(--gold);color:#000;}  
.vip-badge{background:linear-gradient(135deg,var(--gold),#ff9500);color:#000;}  
  
/* LEADERBOARD */  
#lbScreen{padding:0;}  
.lb-body{width:100%;max-width:480px;padding:16px;}  
.lb-my-rank{padding:16px 20px;margin-bottom:16px;border-radius:14px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(170,68,255,.1));border:1px solid var(--accent);display:flex;align-items:center;gap:14px;}  
.lb-my-rank .rank-num{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--accent);width:40px;}  
.lb-my-rank .rank-info{flex:1;}  
.lb-my-rank .rank-name{font-size:15px;font-weight:700;}  
.lb-my-rank .rank-score{font-size:12px;color:var(--muted);}  
.lb-list{display:flex;flex-direction:column;gap:8px;}  
.lb-row{padding:13px 16px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;gap:12px;}  
.lb-row.top1{border-color:var(--gold);background:rgba(255,215,0,.05);}  
.lb-row.top2{border-color:#aaa;background:rgba(200,200,200,.04);}  
.lb-row.top3{border-color:#cd7f32;background:rgba(205,127,50,.04);}  
.lb-rank{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;width:28px;color:var(--muted);}  
.lb-avatar{font-size:20px;}  
.lb-info{flex:1;}  
.lb-name{font-size:14px;font-weight:700;}  
.lb-lvl{font-size:10px;color:var(--muted);}  
.lb-score{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);}  
  
/* SETTINGS */  
#settingsScreen{padding:0;}  
.settings-body{width:100%;max-width:480px;padding:16px;display:flex;flex-direction:column;gap:10px;}  
.setting-row{padding:16px 18px;border-radius:12px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}  
.setting-label{font-size:14px;font-weight:600;}  
.setting-sub{font-size:11px;color:var(--muted);margin-top:2px;}  
.toggle{width:48px;height:26px;border-radius:13px;background:var(--muted);cursor:pointer;position:relative;transition:.2s;border:none;}  
.toggle.on{background:var(--accent);}  
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;}  
.toggle.on::after{left:25px;}  
  
/* GAME */  
#gameScreen{padding:0;background:transparent;}  
#gameHUD{position:absolute;top:0;left:0;right:0;padding:10px 14px;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;}  
.hud-left,.hud-right{display:flex;flex-direction:column;gap:4px;}  
.hud-score{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:#fff;text-shadow:0 0 12px var(--accent);}  
.hud-combo{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--accent2);opacity:0;transition:.2s;}  
.hud-combo.show{opacity:1;}  
.hud-level{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--purple);text-align:right;}  
.hud-best{font-size:10px;color:var(--muted);text-align:right;}  
.hud-theme{font-size:9px;color:rgba(255,255,255,.35);text-align:right;}  
#powerBarHUD{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.06);z-index:10;pointer-events:none;}  
#powerFillHUD{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width .1s;}  
#gameCanvas{display:block;width:100%;height:100%;}  
#pauseBtn{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:11;width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}  
  
/* OVERLAYS */  
.overlay{position:absolute;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,22,.85);backdrop-filter:blur(6px);}  
.overlay.show{display:flex;}  
.overlay-box{text-align:center;padding:32px 28px;max-width:320px;width:90%;}  
.overlay-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;margin-bottom:6px;}  
.overlay-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}  
.overlay-score{font-family:'Orbitron',sans-serif;font-size:36px;color:var(--gold);margin-bottom:4px;}  
.overlay-best{font-size:12px;color:var(--muted);margin-bottom:6px;}  
.overlay-xp{font-size:12px;color:var(--purple);margin-bottom:20px;}  
.overlay-btns{display:flex;flex-direction:column;gap:10px;}  
  
/* IAP MODAL */  
#iapModal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);}  
#iapModal.show{display:flex;}  
.iap-modal-box{background:linear-gradient(135deg,#0d0d28,#1a1a3e);border:1px solid rgba(255,215,0,.35);border-radius:20px;padding:32px 24px;max-width:340px;width:90%;text-align:center;position:relative;}  
.iap-modal-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--gold);margin-bottom:6px;}  
.iap-modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}  
.iap-modal-icon{font-size:56px;margin-bottom:12px;display:block;}  
.iap-modal-price{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:#fff;margin-bottom:4px;}  
.iap-modal-coins{font-size:13px;color:var(--gold);margin-bottom:20px;}  
.iap-modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}  
.iap-disclaimer{font-size:9px;color:var(--muted);margin-top:12px;line-height:1.5;}  
  
/* TOAST */  
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(0,212,255,.15);border:1px solid var(--accent);border-radius:10px;padding:12px 24px;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--accent);z-index:999;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap;backdrop-filter:blur(10px);}  
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}  
  
@keyframes coinPop{0%{transform:translateY(0) scale(1);opacity:1;}100%{transform:translateY(-60px) scale(1.5);opacity:0;}}  
.coin-anim{position:fixed;z-index:999;font-family:'Orbitron',sans-serif;font-size:14px;color:var(--gold);pointer-events:none;animation:coinPop .8s forwards;}  
  
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}  
@keyframes shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}  
@keyframes floatUp{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-80px);opacity:0;}}  
@keyframes bgTransition{0%{opacity:0;}100%{opacity:1;}}  
  
.theme-indicator{position:absolute;top:50px;right:10px;z-index:10;pointer-events:none;}  
.theme-badge{font-family:'Orbitron',sans-serif;font-size:8px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.3);padding:3px 8px;border-radius:10px;backdrop-filter:blur(4px);}  
  
@media(max-width:400px){.login-box{padding:28px 20px;}.login-logo{font-size:30px;}}  
</style>  
</head>  
<body>  
<canvas id="bgCanvas"></canvas>  
<div id="toast"></div>  
  
<!-- IAP MODAL -->  
<div id="iapModal">  
  <div class="iap-modal-box">  
    <button class="iap-modal-close" onclick="closeIAPModal()">✕</button>  
    <span class="iap-modal-icon" id="iapModalIcon">💎</span>  
    <div class="iap-modal-title" id="iapModalTitle">Coin Paketi</div>  
    <div class="iap-modal-sub" id="iapModalSub">1000 🪙 + Bonus!</div>  
    <div class="iap-modal-price" id="iapModalPrice">₺29,99</div>  
    <div class="iap-modal-coins" id="iapModalCoins">🪙 1000 Coin</div>  
    <div class="platform-btns" style="margin-bottom:10px;">  
      <button class="platform-btn btn-gplay" onclick="simulatePurchase('google')">  
        <span style="font-size:18px;">▶</span> Google Play  
      </button>  
      <button class="platform-btn btn-apple" onclick="simulatePurchase('apple')">  
        <span style="font-size:18px;">🍎</span> App Store  
      </button>  
    </div>  
    <div class="iap-disclaimer">Bu bir simülasyondur. Gerçek uygulama yayınlandığında Google Play / App Store ile entegre edilecektir. Satın alma işlemi güvenli ödeme sistemleri ile gerçekleştirilecektir.</div>  
  </div>  
</div>  
  
<!-- LOGIN -->  
<div id="loginScreen" class="screen active z1">  
  <div class="login-box">  
    <div class="login-logo">Neo
